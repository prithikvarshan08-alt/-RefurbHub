[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Send all non-asset requests to the Nitro server function (SSR).
# The function is built into .netlify/functions-internal/ but at runtime
# Netlify exposes it under /.netlify/functions/<name>.
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/server"
  status = 200